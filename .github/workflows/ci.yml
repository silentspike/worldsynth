name: CI

on:
  push:
    branches: [main, sprint-1, sprint-2, sprint-3, sprint-4]
  pull_request:
    branches: [main, sprint-1, sprint-2, sprint-3, sprint-4]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: Changes Detection + File Existence ────────────────────
  changes:
    # Avoid duplicate full CI on sprint integration PRs: the same SHA is
    # already validated on sprint push; PR to main keeps only lightweight PR gates.
    if: >-
      !(github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      startsWith(github.head_ref, 'sprint-'))
    runs-on:
      - self-hosted
      - ${{ github.event_name == 'pull_request' && (github.base_ref == 'sprint-2' && 'worldsynth-s2' || github.base_ref == 'sprint-3' && 'worldsynth-s3' || github.base_ref == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') || (github.ref_name == 'sprint-2' && 'worldsynth-s2' || github.ref_name == 'sprint-3' && 'worldsynth-s3' || github.ref_name == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') }}
    outputs:
      zig: ${{ steps.filter.outputs.zig }}
      ui: ${{ steps.filter.outputs.ui }}
      ci: ${{ steps.filter.outputs.ci }}
      docs-only: ${{ steps.filter.outputs.docs-only }}
      has_zig: ${{ steps.exists.outputs.has_zig }}
      has_ui: ${{ steps.exists.outputs.has_ui }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            zig:
              - 'src/**'
              - 'build.zig'
              - 'build.zig.zon'
              - 'clap-sdk/**'
            ui:
              - 'ui/**'
            ci:
              - '.github/**'
            docs-only:
              - '**/*.md'
              - 'docs/**'
              - 'LICENSE'
              - '.editorconfig'

      - name: Check file existence
        id: exists
        run: |
          echo "has_zig=$( [ -f build.zig ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has_ui=$( [ -f ui/package.json ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

  # ── PR Gate: Lint (always runs) ──────────────────────────────────
  lint:
    runs-on:
      - self-hosted
      - ${{ github.event_name == 'pull_request' && (github.base_ref == 'sprint-2' && 'worldsynth-s2' || github.base_ref == 'sprint-3' && 'worldsynth-s3' || github.base_ref == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') || (github.ref_name == 'sprint-2' && 'worldsynth-s2' || github.ref_name == 'sprint-3' && 'worldsynth-s3' || github.ref_name == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') }}
    needs: [changes]
    steps:
      - uses: actions/checkout@v6

      - name: Check for hidden Unicode/Bidi characters (CVE-2021-42574)
        run: |
          if grep -rP '[\x{200B}-\x{200F}\x{202A}-\x{202E}\x{2066}-\x{2069}]' \
            --include='*.zig' --include='*.ts' --include='*.js' --include='*.svelte' \
            --include='*.yml' --include='*.yaml' --include='*.json' .; then
            echo "::error::Hidden Unicode/Bidi characters found!"
            exit 1
          fi

      - name: Check Zig formatting
        if: (needs.changes.outputs.zig == 'true' || github.event_name == 'push') && needs.changes.outputs.has_zig == 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run zig fmt --check
        if: (needs.changes.outputs.zig == 'true' || github.event_name == 'push') && needs.changes.outputs.has_zig == 'true'
        run: |
          if [ -d src/ ]; then
            find src/ -name '*.zig' -print0 | xargs -r -0 zig fmt --check 2>&1 || {
              echo "::error::Zig formatting check failed. Run 'zig fmt' locally."
              exit 1
            }
          else
            echo "::notice::src/ directory not found, skipping zig fmt check"
          fi

  # ── PR Gate: Zig Build + Test ────────────────────────────────────
  build-zig:
    runs-on:
      - self-hosted
      - ${{ github.event_name == 'pull_request' && (github.base_ref == 'sprint-2' && 'worldsynth-s2' || github.base_ref == 'sprint-3' && 'worldsynth-s3' || github.base_ref == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') || (github.ref_name == 'sprint-2' && 'worldsynth-s2' || github.ref_name == 'sprint-3' && 'worldsynth-s3' || github.ref_name == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') }}
    if: >-
      needs.changes.outputs.has_zig == 'true' &&
      (needs.changes.outputs.zig == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'push')
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Zig cache: .zig-cache/ and zig-cache/ directories
      - uses: actions/cache@v4
        with:
          path: |
            .zig-cache/
            zig-cache/
            ~/.cache/zig/
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig', 'build.zig.zon', 'src/**/*.zig') }}
          restore-keys: |
            zig-${{ runner.os }}-

      # Audio deps (libasound2-dev, libjack-jackd2-dev, libwebkit2gtk-4.1-dev,
      # pkg-config) are pre-installed on the self-hosted runner.

      - name: Build
        run: zig build

      - name: Test (parallel functional shards)
        run: |
          # Functional/non-benchmark shards run in parallel for throughput.
          # Benchmark shards run in .github/workflows/benchmark.yml to avoid
          # duplicated benchmark execution on the same SHA.
          WS_TEST_SHARDS_FILE=scripts/test-shards-ci-parallel.txt scripts/test-parallel.sh

      # Build CLAP plugin artifact (verify it produces .clap)
      - name: Verify CLAP plugin artifact
        run: |
          if [ -f zig-out/lib/worldsynth.clap ]; then
            echo "CLAP plugin built: $(ls -lh zig-out/lib/worldsynth.clap)"
          else
            echo "::notice::No .clap artifact yet (expected until plugin build is implemented)"
          fi

  # ── PR Gate: UI Build + TypeCheck ────────────────────────────────
  build-ui:
    runs-on:
      - self-hosted
      - ${{ github.event_name == 'pull_request' && (github.base_ref == 'sprint-2' && 'worldsynth-s2' || github.base_ref == 'sprint-3' && 'worldsynth-s3' || github.base_ref == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') || (github.ref_name == 'sprint-2' && 'worldsynth-s2' || github.ref_name == 'sprint-3' && 'worldsynth-s3' || github.ref_name == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') }}
    if: >-
      needs.changes.outputs.has_ui == 'true' &&
      (needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'push')
    needs: [changes]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build
        run: cd ui && npm run build

      - name: Type check
        run: cd ui && npm run check

      # npm audit blocks on high+ severity vulnerabilities
      - name: Security audit
        run: cd ui && npm audit --audit-level=high

  # ── PR Gate: Security ────────────────────────────────────────────
  security:
    runs-on:
      - self-hosted
      - ${{ github.event_name == 'pull_request' && (github.base_ref == 'sprint-2' && 'worldsynth-s2' || github.base_ref == 'sprint-3' && 'worldsynth-s3' || github.base_ref == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') || (github.ref_name == 'sprint-2' && 'worldsynth-s2' || github.ref_name == 'sprint-3' && 'worldsynth-s3' || github.ref_name == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1') }}
    if: >-
      needs.changes.outputs.zig == 'true' ||
      needs.changes.outputs.ui == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'push'
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # gitleaks is pre-installed on the self-hosted runner.

      - name: Scan for secrets (gitleaks)
        run: gitleaks detect --source . --verbose --redact
