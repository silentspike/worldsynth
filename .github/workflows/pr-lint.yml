name: PR Lint

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            deps
            security
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            The subject "{subject}" does not match the required pattern.
            Use conventional commit format: type(optional-scope): description

  wp-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;

            // Extract prefix (feat, fix, etc.)
            const prefixMatch = title.match(/^(\w+)(\(.*?\))?:/);
            if (!prefixMatch) return; // Not conventional commit format, skip

            const prefix = prefixMatch[1].toLowerCase();

            // Only require WP-XXX for implementation types
            const requiresWp = ['feat', 'fix', 'refactor', 'perf', 'test'];
            const exemptTypes = ['ci', 'chore', 'deps', 'docs', 'security', 'build', 'style', 'revert'];

            if (exemptTypes.includes(prefix)) {
              core.info(`Type "${prefix}" is exempt from WP reference requirement`);
              return;
            }

            if (requiresWp.includes(prefix)) {
              const hasWp = /\(WP-\d{3}\)/.test(title);
              if (!hasWp) {
                core.setFailed(
                  `PR title must end with (WP-XXX) for ${prefix} type.\n` +
                  `Example: "${prefix}(dsp): add ADAA saw oscillator (WP-012)"\n` +
                  `Exempt types (no WP needed): ${exemptTypes.join(', ')}`
                );
              }
            }
