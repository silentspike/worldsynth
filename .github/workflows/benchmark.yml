name: Benchmark Regression

on:
  push:
    branches: [main, sprint-1, sprint-2, sprint-3, sprint-4]
    paths:
      - 'src/**/*.zig'
      - 'build.zig'
      - 'build.zig.zon'

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    timeout-minutes: 30
    runs-on:
      - self-hosted
      - ${{ github.ref_name == 'sprint-2' && 'worldsynth-s2' || github.ref_name == 'sprint-3' && 'worldsynth-s3' || github.ref_name == 'sprint-4' && 'worldsynth-s4' || 'worldsynth-s1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Run benchmark tests (benchmark-only)
        id: bench
        run: |
          set +e
          mkdir -p .zig-cache .zig-global-cache
          zig test \
            --dep build_options \
            -Mroot=src/main.zig \
            -Mbuild_options=scripts/build_options.test.zig \
            --cache-dir .zig-cache \
            --global-cache-dir .zig-global-cache \
            --test-filter 'benchmark:' \
            > benchmark-full-output.txt 2>&1
          EXIT_CODE=$?
          set -e

          cat benchmark-full-output.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Benchmark test execution failed (exit ${EXIT_CODE})"
            exit "$EXIT_CODE"
          fi

          # Extract benchmark lines.
          # Preferred format: "benchmark: name ... = valueunit"
          # Fallback format in this repo: "[WP-XYZ] name: valueunit ..."
          BENCH_LINES=$(grep -E '^benchmark:' benchmark-full-output.txt || true)
          WP_LINES=$(grep -E '^[[:space:]]*\[WP-[0-9]+' benchmark-full-output.txt || true)

          if [ -z "$BENCH_LINES" ] && [ -z "$WP_LINES" ]; then
            echo "::error::No benchmark output found in benchmark-only run"
            exit 1
          fi

          # Convert to JSON for artifact storage
          echo "[" > benchmark-results.json
          FIRST=true
          COUNT=0

          # Parse native "benchmark:" lines when available.
          if [ -n "$BENCH_LINES" ]; then
            while IFS= read -r line; do
              NAME=$(echo "$line" | sed -E 's/^benchmark:\s+(\S+).*/\1/')
              VALUE=$(echo "$line" | sed -E 's/.*=\s*([0-9.]+).*/\1/')
              UNIT=$(echo "$line" | sed -E 's/.*=\s*[0-9.]+(.*)/\1/' | xargs)

              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                echo "," >> benchmark-results.json
              fi
              echo "  {\"name\": \"$NAME\", \"value\": $VALUE, \"unit\": \"$UNIT\"}" >> benchmark-results.json
              COUNT=$((COUNT + 1))
            done <<< "$BENCH_LINES"
          fi

          # Fallback parser for [WP-...] lines (takes first numeric metric after ':').
          if [ "$COUNT" -eq 0 ] && [ -n "$WP_LINES" ]; then
            while IFS= read -r line; do
              NAME=$(echo "$line" | sed -E 's/^[[:space:]]*\[WP-[0-9]+\]\s*([^:]+):.*/\1/' | xargs)
              VALUE=$(echo "$line" | sed -nE 's/^[[:space:]]*\[WP-[0-9]+\][^:]*:[[:space:]]*([0-9]+(\.[0-9]+)?).*/\1/p')
              UNIT=$(echo "$line" | sed -nE 's/^[[:space:]]*\[WP-[0-9]+\][^:]*:[[:space:]]*[0-9]+(\.[0-9]+)?([^ ,)]*).*/\2/p' | xargs)

              if [ -z "$VALUE" ]; then
                continue
              fi
              if [ -z "$UNIT" ]; then
                UNIT="value"
              fi

              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                echo "," >> benchmark-results.json
              fi
              echo "  {\"name\": \"$NAME\", \"value\": $VALUE, \"unit\": \"$UNIT\"}" >> benchmark-results.json
              COUNT=$((COUNT + 1))
            done <<< "$WP_LINES"
          fi

          echo "]" >> benchmark-results.json

          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::Benchmark tests passed but no structured numeric lines were parsed; skipping artifact/compare."
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
          echo "Benchmark results:"
          cat benchmark-results.json

      - name: Save benchmark artifact
        if: steps.bench.outputs.has_benchmarks == 'true'
        uses: actions/cache/save@v4
        with:
          path: benchmark-results.json
          key: benchmark-${{ github.ref_name }}-${{ github.sha }}

      - name: Load baseline (PR only)
        if: github.event_name == 'pull_request' && steps.bench.outputs.has_benchmarks == 'true'
        id: baseline
        uses: actions/cache/restore@v4
        with:
          path: baseline-results.json
          key: benchmark-${{ github.base_ref }}-
          restore-keys: |
            benchmark-${{ github.base_ref }}-

      - name: Compare benchmarks (PR only)
        if: github.event_name == 'pull_request' && steps.bench.outputs.has_benchmarks == 'true' && steps.baseline.outputs.cache-hit == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let current, baseline;
            try {
              current = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));
              baseline = JSON.parse(fs.readFileSync('baseline-results.json', 'utf8'));
            } catch (e) {
              core.info('Could not parse benchmark files — skipping comparison');
              return;
            }

            // Build lookup from baseline
            const baseMap = {};
            for (const b of baseline) {
              baseMap[b.name] = b;
            }

            const rows = [];
            let hasRegression = false;
            let hasCritical = false;

            for (const cur of current) {
              const base = baseMap[cur.name];
              if (!base) {
                rows.push(`| ${cur.name} | — | ${cur.value}${cur.unit} | NEW |`);
                continue;
              }

              const diff = ((cur.value - base.value) / base.value * 100).toFixed(1);
              let status = 'OK';

              if (cur.value > base.value * 1.5) {
                status = 'CRITICAL (+' + diff + '%)';
                hasCritical = true;
                hasRegression = true;
              } else if (cur.value > base.value * 1.2) {
                status = 'WARNING (+' + diff + '%)';
                hasRegression = true;
              } else if (cur.value < base.value * 0.8) {
                status = 'IMPROVED (' + diff + '%)';
              }

              rows.push(`| ${cur.name} | ${base.value}${base.unit} | ${cur.value}${cur.unit} | ${status} |`);
            }

            // Post PR comment
            const header = hasRegression
              ? '## Benchmark Regression Detected'
              : '## Benchmark Results';

            const body = [
              header,
              '',
              '| Benchmark | Baseline | Current | Status |',
              '|-----------|----------|---------|--------|',
              ...rows,
              '',
              hasRegression
                ? '> **WARNING:** Benchmarks slower than baseline. >20% = WARNING, >50% = CRITICAL.'
                : '> All benchmarks within acceptable range.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

            if (hasCritical) {
              core.setFailed('Critical benchmark regression detected (>50% slower)');
            }
