name: Sprint Branch Target Check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-target-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;
            const baseBranch = pr.base.ref;

            // PRs against main are always allowed (merge PRs from lead)
            if (baseBranch === 'main') {
              core.info('PR targets main — allowed (merge/release PR)');
              return;
            }

            // Extract WP number from title
            const wpMatch = title.match(/WP-(\d{3})/);
            if (!wpMatch) {
              core.info('No WP-XXX in PR title — skipping target check');
              return;
            }

            const wpNum = parseInt(wpMatch[1], 10);

            // WP -> Sprint-Branch mapping
            let expectedBranch;
            if (wpNum >= 0 && wpNum <= 31) {
              expectedBranch = 'sprint-1';
            } else if (wpNum >= 32 && wpNum <= 92) {
              expectedBranch = 'sprint-2';
            } else if (wpNum >= 93 && wpNum <= 122) {
              expectedBranch = 'sprint-3';
            } else if (wpNum >= 123 && wpNum <= 142) {
              expectedBranch = 'sprint-4';
            } else {
              core.info(`WP-${wpMatch[1]} is outside known range — skipping`);
              return;
            }

            if (baseBranch !== expectedBranch) {
              // Add warning label
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['quality:wrong-target']
                });
              } catch {}

              // Post warning comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '## Wrong Target Branch',
                  '',
                  `This PR references **WP-${wpMatch[1]}** which belongs to **\`${expectedBranch}\`**,`,
                  `but targets **\`${baseBranch}\`**.`,
                  '',
                  '**WP -> Branch Mapping:**',
                  '| WP Range | Branch |',
                  '|----------|--------|',
                  '| WP-000..031 | `sprint-1` |',
                  '| WP-032..092 | `sprint-2` |',
                  '| WP-093..122 | `sprint-3` |',
                  '| WP-123..142 | `sprint-4` |',
                  '',
                  'Please update the target branch or verify this is intentional.',
                ].join('\n')
              });

              core.setFailed(
                `WP-${wpMatch[1]} should target ${expectedBranch}, not ${baseBranch}`
              );
            } else {
              // Remove label if previously set
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'quality:wrong-target'
                });
              } catch {}
            }
